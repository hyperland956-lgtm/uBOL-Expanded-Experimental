name: Build uBOL-Expanded

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Extra release notes (optional)'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate version
        id: ver
        run: |
          VERSION=$(date -u +"%-Y.%-m%-d.%-H%M")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Clone uBlock source
        run: git clone --depth 1 https://github.com/gorhill/uBlock.git ublock-src

      - name: Download uBOL-home base extensions
        run: |
          mkdir -p chromium firefox
          LATEST_API="https://api.github.com/repos/uBlockOrigin/uBOL-home/releases/latest"
          
          # Download Chromium base
          CHROMIUM_URL=$(curl -s $LATEST_API | jq -r '.assets[] | select(.name | test("chromium.zip")) | .browser_download_url')
          curl -sL $CHROMIUM_URL -o chromium.zip
          unzip -qo chromium.zip -d chromium/
          
          # Download Firefox base
          FIREFOX_URL=$(curl -s $LATEST_API | jq -r '.assets[] | select(.name | test("firefox.signed.xpi|firefox.zip")) | .browser_download_url')
          curl -sL $FIREFOX_URL -o firefox.zip
          unzip -qo firefox.zip -d firefox/
          rm -rf firefox/META-INF

      - name: Download AdGuard filter lists
        run: |
          mkdir -p cache
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/2.txt  -o cache/adguard-base.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/3.txt  -o cache/adguard-tracking.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/14.txt -o cache/adguard-annoyances.txt

      - name: Fetch upstream release notes
        run: |
          node --input-type=module << 'EOF'
          import fs from 'fs';
          const res = await fetch('https://api.github.com/repos/uBlockOrigin/uBOL-home/releases/latest',
            { headers: { 'User-Agent': 'uBOL-Expanded-CI' } });
          const data = await res.json();
          let body = data.body ?? '';
          body = body.replace(/\*\*uBO Lite\*\*/g, '**uBO Lite Expanded**');
          body = body.replace(/\(uBOL\)/g, '(uBOL-Exp.)');
          body = body.replace(/## Installation[\s\S]*$/, '');
          fs.writeFileSync('UPSTREAM_NOTES.md', body.trim());
          EOF

      - name: Run build pipeline
        run: node build/pipeline.mjs

      - name: Package Chromium
        if: always()
        run: |
          if [ -d output-chromium ]; then
            cd output-chromium && zip -r ../uBOL-Expanded_${{ env.VERSION }}.chromium.zip . && cd ..
            echo "SHA_CHROMIUM=$(sha256sum uBOL-Expanded_${{ env.VERSION }}.chromium.zip | awk '{print $1}')" >> $GITHUB_ENV
          fi

      - name: Package Firefox
        if: always()
        run: |
          if [ -d output-firefox ]; then
            cd output-firefox && zip -r ../uBOL-Expanded_${{ env.VERSION }}.firefox.zip . && cd ..
            echo "SHA_FIREFOX=$(sha256sum uBOL-Expanded_${{ env.VERSION }}.firefox.zip | awk '{print $1}')" >> $GITHUB_ENV
          fi

      - name: Compose release body
        run: |
          NOTES=$(cat UPSTREAM_NOTES.md)
          EXTRA="${{ github.event.inputs.notes }}"
          {
            echo "$NOTES"
            echo ""
            if [ -n "$EXTRA" ]; then echo "$EXTRA"; echo ""; fi
            echo "**sha256**"
            if [ -n "$SHA_CHROMIUM" ]; then echo "- chromium: \`$SHA_CHROMIUM\`"; fi
            if [ -n "$SHA_FIREFOX" ]; then echo "- firefox: \`$SHA_FIREFOX\`"; fi
          } > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body_path: RELEASE_BODY.md
          files: |
            uBOL-Expanded_${{ env.VERSION }}.chromium.zip
            uBOL-Expanded_${{ env.VERSION }}.firefox.zip
