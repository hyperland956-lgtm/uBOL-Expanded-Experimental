name: Build uBOL-Expanded

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Extra release notes (optional)'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate version
        id: ver
        run: |
          VERSION=$(date -u +"%-Y.%-m%-d.%-H%M")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Clone uBlock source
        run: git clone --depth 1 https://github.com/gorhill/uBlock.git ublock-src

      - name: Clone uBOL-home (platform base dirs)
        run: |
          git clone --depth 1 https://github.com/uBlockOrigin/uBOL-home.git ubol-home
          cp -r ubol-home/chromium ./chromium
          cp -r ubol-home/firefox ./firefox

      - name: Download extra filter lists
        run: |
          mkdir -p cache

          # AdGuard Base without EasyList (full + optimized)
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/2_without_easylist.txt -o cache/adguard-base-without-el.txt
          curl -sSL "https://github.com/cudios-dev/adfilters/raw/refs/heads/main/output/adblock/2_without_easylist_optimized.txt" -o cache/adguard-base-without-el-opt.txt

          # EasyList / EasyPrivacy optimized
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/101_optimized.txt -o cache/easylist-opt.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/118_optimized.txt  -o cache/easyprivacy-opt.txt

          # AdGuard Tracking Protection (full + optimized)
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/3.txt             -o cache/adguard-tracking.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/3_optimized.txt   -o cache/adguard-tracking-opt.txt

          # AdGuard DNS filter (optimized only)
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/15_optimized.txt  -o cache/adguard-dns-opt.txt

          # AdGuard Cookie Notices (full + optimized)
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/18.txt            -o cache/adguard-cookie.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/18_optimized.txt  -o cache/adguard-cookie-opt.txt

          # AdGuard Popups (full + optimized)
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/19.txt            -o cache/adguard-popups.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/19_optimized.txt  -o cache/adguard-popups-opt.txt

          # AdGuard Mobile App Banners (full + optimized via filter 11)
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/20.txt            -o cache/adguard-mobile.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/11_optimized.txt  -o cache/adguard-mobile-opt.txt

          # AdGuard Other Annoyances (full + optimized)
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/21.txt            -o cache/adguard-other.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/21_optimized.txt  -o cache/adguard-other-opt.txt

          # AdGuard Widgets (full + optimized)
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/22.txt            -o cache/adguard-widgets.txt
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/22_optimized.txt  -o cache/adguard-widgets-opt.txt

          # Search ads unblocking allowlist
          curl -sSL https://filters.adtidy.org/extension/ublock/filters/10.txt            -o cache/adguard-search-ads.txt

          # NSFW Blocker
          curl -sSL https://nsfw-small.oisd.nl/                                           -o cache/oisd-nsfw.txt

      - name: Fetch upstream release notes
        run: |
          node --input-type=module << 'EOF'
          import fs from 'fs';
          const res = await fetch('https://api.github.com/repos/uBlockOrigin/uBOL-home/releases/latest',
            { headers: { 'User-Agent': 'uBOL-Expanded-CI' } });
          const data = await res.json();
          let body = data.body ?? '';
          body = body.replace(/\*\*uBO Lite\*\*/g, '**uBO Lite Expanded**');
          body = body.replace(/\(uBOL\)/g, '(uBOL-Exp.)');
          body = body.replace(/## Installation[\s\S]*$/, '');
          fs.writeFileSync('UPSTREAM_NOTES.md', body.trim());
          EOF

      - name: Run build pipeline
        run: node build/pipeline.mjs

      - name: Package Chromium
        if: always()
        run: |
          if [ -d output-chromium ]; then
            cd output-chromium && zip -r ../uBOL-Expanded_${{ env.VERSION }}.chromium.zip . && cd ..
            echo "SHA_CHROMIUM=$(sha256sum uBOL-Expanded_${{ env.VERSION }}.chromium.zip | awk '{print $1}')" >> $GITHUB_ENV
          fi

      - name: Package Firefox
        if: always()
        run: |
          if [ -d output-firefox ]; then
            cd output-firefox && zip -r ../uBOL-Expanded_${{ env.VERSION }}.firefox.zip . && cd ..
            echo "SHA_FIREFOX=$(sha256sum uBOL-Expanded_${{ env.VERSION }}.firefox.zip | awk '{print $1}')" >> $GITHUB_ENV
          fi

      - name: Compose release body
        run: |
          NOTES=$(cat UPSTREAM_NOTES.md)
          EXTRA="${{ github.event.inputs.notes }}"
          {
            echo "$NOTES"
            echo ""
            if [ -n "$EXTRA" ]; then echo "$EXTRA"; echo ""; fi
            echo "**sha256**"
            if [ -n "$SHA_CHROMIUM" ]; then echo "- chromium: \`$SHA_CHROMIUM\`"; fi
            if [ -n "$SHA_FIREFOX" ]; then echo "- firefox: \`$SHA_FIREFOX\`"; fi
          } > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body_path: RELEASE_BODY.md
          files: |
            uBOL-Expanded_${{ env.VERSION }}.chromium.zip
            uBOL-Expanded_${{ env.VERSION }}.firefox.zip
