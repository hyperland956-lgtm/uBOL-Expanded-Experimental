name: Sign Firefox Extension (AMO)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sign (leave blank for latest)'
        required: false
        default: ''

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name')
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          FIREFOX_URL=$(gh api repos/${{ github.repository }}/releases/latest \
            --jq '.assets[] | select(.name | test("firefox")) | .browser_download_url')
          echo "firefox_url=$FIREFOX_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download and unpack Firefox build
        run: |
          curl -fsSL "${{ steps.release.outputs.firefox_url }}" -o firefox-build.zip
          mkdir -p firefox-src
          unzip -q firefox-build.zip -d firefox-src

      - name: Sign and submit to AMO
        run: |
          cat > amo-metadata.json << 'EOF'
          {
            "categories": [
              "privacy-security"
            ],
            "summary": {
              "en-US": "uBO Lite with extra filter lists. Blocks ads and trackers."
            },
            "version": {
              "license": "GPL-3.0-only"
            }
          }
          EOF
          
          echo "=== amo-metadata.json ===" && cat amo-metadata.json
          
          # For listed channel, AMO requires human review (can take days).
          # We cap the wait at 3 minutes — validation passes in ~1 min,
          # after that we're just waiting for a human. Exit 0 on timeout.
          timeout 180 npx web-ext@latest sign \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --source-dir=firefox-src \
            --channel=listed \
            --amo-metadata=amo-metadata.json \
            --artifacts-dir=./signed || {
            EXIT=$?
            if [ $EXIT -eq 124 ]; then
              echo "✅ Submitted to AMO review queue (timed out waiting for human approval — expected)"
              exit 0
            fi
            echo "❌ web-ext failed with exit code $EXIT"
            exit $EXIT
          }

      - name: Confirm AMO submission
        run: |
          echo "Submitted to AMO review queue for tag ${{ steps.release.outputs.tag }}"
          echo "Users will receive the update via addons.mozilla.org once reviewed."
